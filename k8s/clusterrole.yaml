apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rewind
  labels:
    app.kubernetes.io/name: rewind
rules:
  # Read pod and namespace metadata for service-name tagging.
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rewind
  labels:
    app.kubernetes.io/name: rewind
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rewind
subjects:
  - kind: ServiceAccount
    name: rewind
    namespace: rewind
