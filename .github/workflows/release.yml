name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: rewind
            artifact: rewind-linux-x86_64
            deb_arch: amd64
            rpm_arch: x86_64

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary: rewind
            artifact: rewind-linux-arm64
            deb_arch: arm64
            rpm_arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('rewind/Cargo.lock') }}

      - name: Build release binary
        run: |
          cargo build \
            --manifest-path rewind/Cargo.toml \
            --release \
            --target ${{ matrix.target }}

      - name: Stage binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      # ── .deb package ──────────────────────────────────────────────────────────
      - name: Build .deb
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG=rewind_${VERSION}_${{ matrix.deb_arch }}
          mkdir -p ${PKG}/usr/bin ${PKG}/DEBIAN
          cp ${{ matrix.artifact }} ${PKG}/usr/bin/rewind
          sed \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/" \
            -e "s/ARCH_PLACEHOLDER/${{ matrix.deb_arch }}/" \
            packaging/deb/DEBIAN/control > ${PKG}/DEBIAN/control
          dpkg-deb --build ${PKG}
          sha256sum ${PKG}.deb > ${PKG}.deb.sha256

      # ── .rpm package ──────────────────────────────────────────────────────────
      - name: Build .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sudo apt-get install -y rpm
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp ${{ matrix.artifact }} ~/rpmbuild/SOURCES/rewind-${VERSION}-linux-${{ matrix.rpm_arch }}
          sed "s/%{version}/${VERSION}/g; s/%{arch}/${{ matrix.rpm_arch }}/g" \
            packaging/rpm/rewind.spec > ~/rpmbuild/SPECS/rewind.spec
          rpmbuild -bb \
            --define "version ${VERSION}" \
            --define "arch ${{ matrix.rpm_arch }}" \
            ~/rpmbuild/SPECS/rewind.spec
          cp ~/rpmbuild/RPMS/${{ matrix.rpm_arch }}/rewind-${VERSION}-1.*.rpm \
             rewind-${VERSION}-1.${{ matrix.rpm_arch }}.rpm
          sha256sum rewind-${VERSION}-1.${{ matrix.rpm_arch }}.rpm \
            > rewind-${VERSION}-1.${{ matrix.rpm_arch }}.rpm.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-packages
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
            rewind_*_${{ matrix.deb_arch }}.deb
            rewind_*_${{ matrix.deb_arch }}.deb.sha256
            rewind-*.${{ matrix.rpm_arch }}.rpm
            rewind-*.${{ matrix.rpm_arch }}.rpm.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
