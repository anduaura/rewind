name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: stable

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rewind/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check (userspace)
        run: cargo check --manifest-path rewind/Cargo.toml

      - name: cargo test (userspace)
        run: cargo test --manifest-path rewind/Cargo.toml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain with clippy + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('rewind/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: rustfmt check
        run: cargo fmt --manifest-path rewind/Cargo.toml -- --check

      - name: clippy
        run: cargo clippy --manifest-path rewind/Cargo.toml -- -D warnings
